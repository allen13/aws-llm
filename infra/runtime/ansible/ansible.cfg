[defaults]
inventory          = inventory/local.yml
roles_path         = roles
collections_path   = collections
log_path           = /var/log/aws-llm/ansible.log
stdout_callback    = default
gathering          = explicit
host_key_checking  = False
retry_files_enabled = False
forks              = 1
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
